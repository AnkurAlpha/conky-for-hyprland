conky.config = {
    -- Window Settings
    alignment = 'top_middle',
    gap_x = 0,
    gap_y = 50,
    minimum_width = 400,

    -- Wayland / Hyprland Compatibility
    out_to_wayland = true,
    own_window = true,
    own_window_type = 'desktop',
    own_window_class = 'conky',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,

    -- Graphics / Fonts
    double_buffer = true,
    update_interval = 1.0,
    use_xft = true,
    font = 'JetBrainsMono Nerd Font:size=12',

    -- Custom Colors from the Image
    default_color = 'FFFFFF', -- White
    color1 = '00FF41',        -- Vibrant Green for the day highlight and pipe
    color2 = 'FF4B72',        -- Pink/Magenta for the month
    color3 = '888888',        -- Dim grey for the inactive days
}

conky.text = [[
${alignc}${color3}${font JetBrainsMono Nerd Font:bold:size=14}${if_match ${time %w}==0}${color1}S${color3}${else}S${endif}  ${if_match ${time %w}==1}${color1}M${color3}${else}M${endif}  ${if_match ${time %w}==2}${color1}T${color3}${else}T${endif}  ${if_match ${time %w}==3}${color1}W${color3}${else}W${endif}  ${if_match ${time %w}==4}${color1}T${color3}${else}T${endif}  ${if_match ${time %w}==5}${color1}F${color3}${else}F${endif}  ${if_match ${time %w}==6}${color1}S${color3}${else}S${endif}${font}
${voffset -10}${alignc}${color}${font JetBrainsMono Nerd Font:bold:size=80}${time %d}${font}
${voffset -5}${alignc}${color2}${font JetBrainsMono Nerd Font:bold:size=40}${execi 3600 date +%^B}${font}
${voffset 5}${alignc}${color}${font JetBrainsMono Nerd Font:size=28}${time %H} ${color1}|${color} ${time %M}${font}
]]
