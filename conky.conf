conky.config = {
    -- Window Settings
    alignment = 'top_right',
    gap_x = 50,
    gap_y = 50,
    minimum_width = 360,
    maximum_width = 360,

    -- Wayland / Hyprland Compatibility
    out_to_wayland = true,
    own_window = true,
    own_window_type = 'desktop',
    own_window_class = 'conky',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,

    -- Graphics / Fonts
    double_buffer = true,
    update_interval = 1.0,
    use_xft = true,
    font = 'JetBrainsMono Nerd Font:size=10',
    default_color = 'FFFFFF',
    color1 = '00D1FF', -- Cyan for accents
    color2 = '888888', -- Grey for secondary text
}

conky.text = [[
${font JetBrainsMono Nerd Font:bold:size=9}${color1}S Y S T E M ${hr 2}${font}${color}
${voffset 4}${color1}Host:${color} HP Victus ${goto 180}${color1}Distro:${color} Garuda Linux
${color1}Kernel:${color} $kernel ${goto 180}${color1}Uptime:${color} $uptime
${color1}Window:${color} Hyprland ${goto 180}${color1}Shell:${color} $sysname $machine

${voffset 8}${font JetBrainsMono Nerd Font:bold:size=9}${color1}T E M P E R A T U R E S ${hr 2}${font}${color}
${voffset 4}${color1}CPU Temp:${color} ${hwmon 1 temp 1}°C ${goto 180}${color1}GPU Temp:${color} ${execi 5 nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader}°C

${voffset 8}${font JetBrainsMono Nerd Font:bold:size=9}${color1}P R O C E S S O R S ${hr 2}${font}${color}
${voffset 4}${color1}Intel i5-12450H ${goto 180}${color1}Avg Load:${color} $loadavg
${voffset 4}${color1}CPU  1:${color}${goto 75}${cpu cpu1}% ${alignr}${color1}${cpubar cpu1 4,170}${color}
${color1}CPU  2:${color}${goto 75}${cpu cpu2}% ${alignr}${color1}${cpubar cpu2 4,170}${color}
${color1}CPU  3:${color}${goto 75}${cpu cpu3}% ${alignr}${color1}${cpubar cpu3 4,170}${color}
${color1}CPU  4:${color}${goto 75}${cpu cpu4}% ${alignr}${color1}${cpubar cpu4 4,170}${color}
${color1}CPU  5:${color}${goto 75}${cpu cpu5}% ${alignr}${color1}${cpubar cpu5 4,170}${color}
${color1}CPU  6:${color}${goto 75}${cpu cpu6}% ${alignr}${color1}${cpubar cpu6 4,170}${color}
${color1}CPU  7:${color}${goto 75}${cpu cpu7}% ${alignr}${color1}${cpubar cpu7 4,170}${color}
${color1}CPU  8:${color}${goto 75}${cpu cpu8}% ${alignr}${color1}${cpubar cpu8 4,170}${color}
${color1}CPU  9:${color}${goto 75}${cpu cpu9}% ${alignr}${color1}${cpubar cpu9 4,170}${color}
${color1}CPU 10:${color}${goto 75}${cpu cpu10}% ${alignr}${color1}${cpubar cpu10 4,170}${color}
${color1}CPU 11:${color}${goto 75}${cpu cpu11}% ${alignr}${color1}${cpubar cpu11 4,170}${color}
${color1}CPU 12:${color}${goto 75}${cpu cpu12}% ${alignr}${color1}${cpubar cpu12 4,170}${color}

${voffset 8}${font JetBrainsMono Nerd Font:bold:size=9}${color1}P R O C E S S E S ${hr 2}${font}${color}
${voffset 4}${color1}Active:${color} $processes ${goto 180}${color1}RAM Usage:${color} $mem / $memmax
${voffset 4}${color1}Name ${goto 180}PID${alignr}CPU%${color}
${top name 1} ${goto 180}${top pid 1}${alignr}${top cpu 1}%
${top name 2} ${goto 180}${top pid 2}${alignr}${top cpu 2}%
${top name 3} ${goto 180}${top pid 3}${alignr}${top cpu 3}%
${top name 4} ${goto 180}${top pid 4}${alignr}${top cpu 4}%
${top name 5} ${goto 180}${top pid 5}${alignr}${top cpu 5}%

${voffset 8}${font JetBrainsMono Nerd Font:bold:size=9}${color1}N E T W O R K ${hr 2}${font}${color}
${voffset 4}${color1}WiFi (wlp0s20f3):${color} ${addr wlp0s20f3}
${color1}Download:${color} ${downspeed wlp0s20f3} ${alignr}${color1}Upload:${color} ${upspeed wlp0s20f3}

${voffset 8}${font JetBrainsMono Nerd Font:bold:size=9}${color1}B A T T E R Y   &   D R I V E S ${hr 2}${font}${color}
${voffset 4}${color1}Battery:${color} ${battery_percent BAT0}% ${alignr}${color1}${battery_bar 4,170 BAT0}${color}
${color1}Storage:${color} ${fs_used /} / ${fs_size /} ${alignr}${color1}${fs_bar 4,170 /}${color}
${voffset 15}
]]
